services:
  azurite:
    image: mcr.microsoft.com/azure-storage/azurite:3.35.0-arm64
    container_name: azurite
    ports:
      - "10000:10000"
      - "10001:10001"
      - "10002:10002"
    volumes:
      - "${VOLUME_PATH}:/data"
    command: ["azurite", "-l", "/data", "--blobHost", "0.0.0.0", "--blobPort", "10000", "--queueHost", "0.0.0.0", "--queuePort", "10001", "--tableHost", "0.0.0.0", "--tablePort", "10002", "--skipApiVersionCheck"]
    restart: unless-stopped
