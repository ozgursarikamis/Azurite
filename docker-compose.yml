services:
  azurite:
    image: mcr.microsoft.com/azure-storage/azurite:3.35.0-arm64
    container_name: azurite
    ports:
      - "10000:10000"
      - "10001:10001"
      - "10002:10002"
    volumes:
      - "${VOLUME_PATH}:/data"
    command: ["azurite", "-l", "/data", "--blobPort", "10000", "--queuePort", "10001", "--tablePort", "10002"]
    restart: unless-stopped
